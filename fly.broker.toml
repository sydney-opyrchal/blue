# Mosquitto MQTT broker. Internal-only — reachable from sibling apps as
# forge-broker.flycast:1883. No public ports.
app = "forge-broker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.broker"

[[services]]
  internal_port = 1883
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
