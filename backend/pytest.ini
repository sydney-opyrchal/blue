[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --cov=app.contracts
    --cov=app.detectors
    --cov=app.alarms
    --cov-report=term-missing
    --cov-report=html:.coverage_html
    --cov-fail-under=70
filterwarnings =
    ignore::DeprecationWarning:sklearn
